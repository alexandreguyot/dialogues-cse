# Nginx vhost for LivePoll — serves the Laravel public/ and proxies PHP to the `app` container.
# Traefik handles SSL termination + Host routing externally; this server listens on plain HTTP inside the Docker network.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    # Body size aligned with php.ini upload limits
    client_max_body_size 32M;

    # Real client IP forwarded by Traefik
    set_real_ip_from 0.0.0.0/0;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    # Security headers (HSTS handled at Traefik level on HTTPS)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Hide hidden files except .well-known (Let's Encrypt path-style ACME, if ever needed)
    location ~ /\.(?!well-known) { deny all; }

    # Livewire / Filament dynamic asset routes — must hit PHP, not the static matcher.
    # `^~` prefix wins over the regex-based static block below.
    location ^~ /livewire/   { try_files $uri /index.php?$query_string; }
    location ^~ /filament/   { try_files $uri /index.php?$query_string; }
    location ^~ /_filament/  { try_files $uri /index.php?$query_string; }

    # Static asset cache — falls back to index.php if the file is served dynamically by Laravel
    location ~* \.(?:css|js|svg|woff2?|ttf|eot|otf|ico|png|jpe?g|gif|webp|avif|map)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param HTTPS           on if_not_empty;
        fastcgi_param X-Forwarded-Proto $http_x_forwarded_proto;

        fastcgi_buffers          16 32k;
        fastcgi_buffer_size      64k;
        fastcgi_read_timeout     60s;
        fastcgi_intercept_errors off;
    }

    # Block access to common attack vectors
    location ~* \.(env|log|sql|sh)$ { deny all; }
    location ~ /(?:vendor|storage|bootstrap/cache) { deny all; }

    # Gzip pre-compression — Vite already minifies; this trims plain HTML/JSON
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml application/xml+rss image/svg+xml;
}
