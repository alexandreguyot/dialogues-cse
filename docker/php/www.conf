; PHP-FPM pool — production
[www]
user  = www-data
group = www-data

listen       = 9000
listen.owner = www-data
listen.group = www-data

; Dynamic worker pool — fits comfortably inside ~250 MB RSS per project.
pm                       = dynamic
pm.max_children          = 12
pm.start_servers         = 3
pm.min_spare_servers     = 2
pm.max_spare_servers     = 5
pm.max_requests          = 500
pm.process_idle_timeout  = 30s

; Log slow requests (>5s) to stderr for triage
request_slowlog_timeout = 5s
slowlog                 = /proc/self/fd/2

; Catch worker stderr in container logs
catch_workers_output    = yes
decorate_workers_output = no

clear_env = no
